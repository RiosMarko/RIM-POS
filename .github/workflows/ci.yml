name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run build

  rust:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --locked --manifest-path src-tauri/Cargo.toml
      - run: cargo test --locked --manifest-path src-tauri/Cargo.toml
